model_name: embedding_hlt_linformer_single_disco_ce_pca3

data:
  val_split: 0.1
  pairwise: false
  preproc_type: PFPreProcessor

hyperparameters:
  num_epochs: 100
  early_stopping_patience: 30
  contrast_loss: SupConLoss
  lr: 0.0001
  lr_min: 0.0
  lr_warmup: 0.05
  batch_size: 2048
  num_heads: 8
  num_layers: 4
  embed_size: 128
  dim_feedforward: 512
  latent_dim: 6
  proj_dim: 6
  linear_dim: 16
  contrast_temp: 0.05
  contrastive_weight: 0.05
  contrastive_max: 0.10
  contrastive_warmup: 0.05
  mixed_prec: true
  use_l2_proxy_md: false
  disco_weight: 1.0
  closure_weight: 1.0
  disco_warmup: 0.4
  closure_warmup: 0.4
  pca_components: 3
  ae_latent: 16
  ae_enc_nodes: [512, 256]
  ae_dec_nodes: [256, 512]
  ae_lr: 0.001
  ae_pretrain_epochs: 20
