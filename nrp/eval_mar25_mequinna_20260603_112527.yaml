apiVersion: batch/v1
kind: Job
metadata:
  name: eval-mar25-mequinna-20260603-112527
  namespace: axol1tl
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: eval
          image: pytorch/pytorch:2.3.1-cuda12.1-cudnn8-runtime
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              echo "=== Job started: $(date) ==="
              export PYTHONPATH=/axovol/contrastive_axis/pylib:$PYTHONPATH
              cd /axovol/contrastive_axis/modularized_nurd_hlt_con_ae
              pip install --quiet --target /axovol/contrastive_axis/pylib -e . 2>/dev/null || true

              python eval_abcd.py \
                --contrast_ckpt    /axovol/contrastive_axis/modularized_nurd_hlt_con_ae/checkpoints/embedding_hlt_linformer_supcon_mar25_mequinna_encoder_20260603_112527.pth \
                --contrast_test_pt /axovol/contrastive_axis/data/hlt_smcocktail_mequinna_test.pt \
                --signal_pt        /axovol/contrastive_axis/data/signal_pt/hlt_signal_TpTp.pt \
                --outdir           /axovol/contrastive_axis/abcd_outputs/mar25_mequinna_encoder_20260603_112527 \
                --n_pca            6 \
                --wandb_run_name   mar25_mequinna_encoder_20260603_112527

              echo "=== Job finished: $(date) ==="
          env:
            - name: WANDB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: wandb-secret
                  key: WANDB_API_KEY
          resources:
            requests:
              memory: "16Gi"
              cpu: "4"
              nvidia.com/gpu: "1"
            limits:
              memory: "32Gi"
              cpu: "8"
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: axovol
              mountPath: /axovol
      volumes:
        - name: axovol
          persistentVolumeClaim:
            claimName: axovol
