apiVersion: batch/v1
kind: Job
metadata:
  name: contrastive-train-qcd-mequinna   # QCD replaced with mequinna sample
  namespace: axol1tl
spec:
  backoffLimit: 0                         # don't auto-retry on failure
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: train
          image: pytorch/pytorch:2.3.1-cuda12.1-cudnn8-runtime
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              echo "=== Job started: $(date) ==="
              echo "Host: $(hostname)"

              # ── Activate persistent Python env ───────────────────────────
              export PYTHONPATH=/axovol/contrastive_axis/pylib:$PYTHONPATH
              export PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True

              # ── Verify GPU ───────────────────────────────────────────────
              python -c "import torch; print('CUDA:', torch.cuda.is_available(), '| Device:', torch.cuda.get_device_name(0) if torch.cuda.is_available() else 'CPU')"

              # ── Install package (editable install is ephemeral; pylib handles deps) ──
              cd /axovol/contrastive_axis/modularized_nurd_hlt_con_ae
              pip install --quiet --target /axovol/contrastive_axis/pylib -e . 2>/dev/null || true

              # ── Run training ─────────────────────────────────────────────
              python train.py \
                --train_cfg configs/train_sup_con_ce.yaml \
                --data_cfg  configs/data_smcocktail.yaml \
                --data      /axovol/contrastive_axis/data/hlt_smcocktail_train.pt \
                --qcd_data  /axovol/contrastive_axis/data/hlt_qcd_1M.pt

              echo "=== Job finished: $(date) ==="

          env:
            - name: WANDB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: wandb-secret       # create with: kubectl create secret generic wandb-secret --from-literal=WANDB_API_KEY=<key> -n axol1tl
                  key: WANDB_API_KEY

          resources:
            requests:
              memory: "32Gi"
              cpu: "4"
              nvidia.com/gpu: "1"
            limits:
              memory: "64Gi"
              cpu: "8"
              nvidia.com/gpu: "1"

          volumeMounts:
            - name: axovol
              mountPath: /axovol

      volumes:
        - name: axovol
          persistentVolumeClaim:
            claimName: axovol
